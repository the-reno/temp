<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ronu.one</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
    }

    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 64px 72px 56px;
      width: min(860px, calc(100vw - 48px));
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .headline {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(52px, 7vw, 76px);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 40px;
    }

    .headline .plain { color: #f0f0f0; }
    .headline .name  { color: #777; font-style: italic; }

    .sub {
      font-size: 15px;
      color: #c0c0c0;
      margin-bottom: 48px;
    }

    hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin-bottom: 36px;
    }

    .tags {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">// hello, world</p>
    <h1 class="headline">
      <span class="plain">I'm </span><span class="name">Ronu.</span>
    </h1>
    <p class="sub">Welcome to my lab.</p>
    <hr>
    <p class="tags">triathlon &nbsp;·&nbsp; science &nbsp;·&nbsp; markets</p>
  </div>
</body>
</html>
